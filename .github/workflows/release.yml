name: Build & release

# Triggers:
#   • Tag push matching v* (created via "Draft a new release" or git tag)
#   • Manual fire from the Actions tab (workflow_dispatch) — pick a tag to build.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (e.g. v0.1.4)'
        required: true
        default: 'v0.1.4'

permissions:
  contents: write   # needed so the workflow can upload the installer to the release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Resolve tag (push vs manual dispatch)
        id: tag
        shell: pwsh
        run: |
          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            '${{ inputs.tag }}'
          } else {
            '${{ github.ref_name }}'
          }
          "name=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          $v = $tag -replace '^v', ''
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          Write-Host "Building tag: $tag (version: $v)"

      - name: Checkout source at the tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.name }}

      - name: Install .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish self-contained single-file build
        shell: pwsh
        run: |
          dotnet publish src/Underlit/Underlit.csproj `
            -c Release -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:Version=${{ steps.tag.outputs.version }} `
            -o publish

      - name: Install Inno Setup via Chocolatey
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Compile the installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=${{ steps.tag.outputs.version }}" `
            installer/Underlit.iss

      - name: Create GitHub Release and attach installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          files: installer/Output/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
